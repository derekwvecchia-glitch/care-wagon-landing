<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Find the Wagon — C.A.R.E. Wagon</title>
<meta name="description" content="See where and when the C.A.R.E. Wagon will be out in Revere." />

<!-- ============================================================
     EDIT THE SCHEDULE IN ONE PLACE: see the STOPS array in the
     <script> block at the bottom of this file.
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">

<style>
  :root{
    --navy:#0A1B33;
    --navy-2:#0F2647;
    --blue:#1F4E96;
    --gold:#D4A537;
    --gold-soft:#E8C76A;
    --cream:#F6F2E8;
    --paper:#FFFFFF;
    --ink:#161B24;
    --ink-soft:#5A6473;
    --line:#E7E0D0;
    --shadow:0 1px 2px rgba(10,27,51,.06), 0 8px 24px rgba(10,27,51,.10);
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}

  .wrap{
    max-width:460px;
    margin:0 auto;
    padding:0 18px 44px;
  }

  /* ---------- Header ---------- */
  .top{
    position:relative;
    margin:0 -18px 0;
    background:
      radial-gradient(120% 80% at 50% -20%, var(--navy-2) 0%, var(--navy) 60%);
    color:#fff;
    padding:30px 26px 26px;
    text-align:center;
    overflow:hidden;
  }
  .top::before{
    content:"";
    position:absolute; inset:14px 14px 18px;
    border:1px solid rgba(212,165,55,.32);
    border-radius:14px;
    pointer-events:none;
  }
  .back{
    display:inline-flex;align-items:center;gap:6px;
    font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--gold-soft);
    margin-bottom:14px;position:relative;z-index:1;
  }
  .back svg{width:14px;height:14px;}
  .eyebrow{
    font-family:"DM Mono",monospace;
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--gold-soft);
    margin:0 0 8px;position:relative;z-index:1;
  }
  h1{
    font-family:"Bricolage Grotesque",sans-serif;
    font-weight:800;
    font-size:clamp(26px,8vw,34px);
    line-height:1.05;
    letter-spacing:-.01em;
    margin:0;position:relative;z-index:1;
  }
  .slogan{
    margin:10px 0 0;
    font-size:14px;
    color:rgba(255,255,255,.82);
    position:relative;z-index:1;
  }

  /* ---------- Awning ---------- */
  .awning{
    margin:0 -18px;
    height:18px;
    background:
      repeating-linear-gradient(90deg,
        var(--gold) 0 22px, var(--gold-soft) 22px 44px);
    -webkit-mask: radial-gradient(13px 18px at 11px 0, transparent 0 12px, #000 13px) repeat-x;
            mask: radial-gradient(13px 18px at 11px 0, transparent 0 12px, #000 13px) repeat-x;
    -webkit-mask-size:22px 18px;
            mask-size:22px 18px;
  }

  /* ---------- Section labels ---------- */
  .section-label{
    font-family:"DM Mono",monospace;
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--blue);
    margin:28px 2px 12px;
  }
  .section-label:first-of-type{margin-top:24px;}

  /* ---------- Stop cards ---------- */
  .stops{list-style:none;margin:0 0 8px;padding:0;display:flex;flex-direction:column;gap:11px;}
  .stop{
    display:flex;gap:14px;align-items:flex-start;
    background:var(--paper);
    border:1px solid var(--line);
    border-left:3px solid var(--gold);
    border-radius:14px;
    padding:14px 15px;
    box-shadow:var(--shadow);
  }
  .stop.past{opacity:.55;border-left-color:var(--line);}
  .date{
    flex:0 0 auto;width:54px;text-align:center;
    background:var(--navy);color:#fff;border-radius:10px;
    padding:8px 4px;
  }
  .date .mon{
    display:block;font-family:"DM Mono",monospace;font-size:9.5px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--gold-soft);
  }
  .date .day{
    display:block;font-family:"Bricolage Grotesque",sans-serif;
    font-weight:800;font-size:19px;line-height:1.1;
  }
  .stop-info{min-width:0;flex:1;}
  .stop-info .evt{
    display:block;
    font-family:"Bricolage Grotesque",sans-serif;
    font-weight:700;font-size:15px;color:var(--ink);
    line-height:1.2;
  }
  .stop-info .loc{
    display:block;margin-top:3px;font-size:13px;color:var(--ink-soft);
  }
  .stop-info .time{
    display:block;margin-top:3px;font-size:12.5px;color:var(--ink-soft);
  }
  .stop-info .note{
    display:block;margin-top:5px;font-size:12px;color:var(--ink-soft);
  }
  .stop-info .addr{
    display:inline-flex;align-items:center;gap:4px;margin-top:6px;
    font-family:"DM Mono",monospace;font-size:11px;color:var(--blue);
  }
  .stop-info .addr svg{width:12px;height:12px;}

  .empty{
    text-align:center;color:var(--ink-soft);font-size:13.5px;
    padding:26px 10px;background:var(--paper);border:1px dashed var(--line);
    border-radius:14px;
  }

  /* ---------- Footer ---------- */
  footer{
    margin-top:34px;text-align:center;
    color:var(--ink-soft);font-size:12px;line-height:1.6;
  }
  footer .div{
    width:46px;height:3px;border-radius:2px;background:var(--gold);
    margin:0 auto 16px;
  }
  footer .unit{color:var(--ink);font-weight:600;}

  /* ---------- Motion ---------- */
  @media (prefers-reduced-motion:no-preference){
    .reveal{opacity:0;transform:translateY(8px);animation:rise .45s ease forwards;}
    @keyframes rise{to{opacity:1;transform:none;}}
  }
</style>
</head>
<body>

  <div class="wrap">

    <header class="top">
      <a class="back" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back
      </a>
      <p class="eyebrow">C.A.R.E. Wagon</p>
      <h1>Find the Wagon</h1>
      <p class="slogan">Upcoming stops &amp; where we've been.</p>
    </header>

    <div class="awning" aria-hidden="true"></div>

    <p class="section-label">Upcoming</p>
    <ul class="stops reveal" id="upcoming-list"></ul>

    <p class="section-label" id="past-label" style="display:none;">Past stops</p>
    <ul class="stops" id="past-list"></ul>

    <footer>
      <div class="div"></div>
      <span class="unit">Revere Police Department</span><br>
      400 Revere Beach Parkway, Revere, MA 02151
    </footer>

  </div>

<script>
  /* ====================================================================
     ↓↓↓  EDIT THE SCHEDULE HERE  ↓↓↓
     One entry per stop. date/endDate must be "YYYY-MM-DD". Leave endDate
     "" for a single-day stop. mapUrl is optional — leave it "" to hide
     the address link for that stop.
     ==================================================================== */
  const STOPS = [
    { name:"Revere Sandcastles", date:"2026-07-17", endDate:"2026-07-19", time:"12:00 PM – 8:00 PM", loc:"200 Revere Beach Boulevard", note:"", mapUrl:"" },
    { name:"National Night Out", date:"2026-08-04", endDate:"", time:"5:00 PM – 7:00 PM", loc:"176 Garfield Ave, Revere", note:"", mapUrl:"" },
  ];

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function parseLocalDate(iso) {
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function renderStop(stop, isPast) {
    const d = parseLocalDate(stop.date);
    const li = document.createElement("li");
    li.className = "stop" + (isPast ? " past" : "");

    let dayLabel = String(d.getDate());
    if (stop.endDate) {
      const dEnd = parseLocalDate(stop.endDate);
      dayLabel = dEnd.getMonth() === d.getMonth()
        ? `${d.getDate()}–${dEnd.getDate()}`
        : `${d.getDate()} ${MONTHS[d.getMonth()]}–${dEnd.getDate()} ${MONTHS[dEnd.getMonth()]}`;
    }

    li.innerHTML = `
      <div class="date">
        <span class="mon">${MONTHS[d.getMonth()]}</span>
        <span class="day">${dayLabel}</span>
      </div>
      <div class="stop-info">
        <span class="evt">${stop.name}</span>
        <span class="loc">${stop.loc}</span>
        <span class="time">${stop.time}</span>
        ${stop.note ? `<span class="note">${stop.note}</span>` : ""}
        ${stop.mapUrl ? `<a class="addr" href="${stop.mapUrl}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            Get directions
          </a>` : ""}
      </div>`;
    return li;
  }

  (function () {
    const today = new Date();
    today.setHours(0,0,0,0);

    const endOf = s => parseLocalDate(s.endDate || s.date);

    const sorted = [...STOPS].sort((a, b) => parseLocalDate(a.date) - parseLocalDate(b.date));
    const upcoming = sorted.filter(s => endOf(s) >= today);
    const past = sorted.filter(s => endOf(s) < today).reverse();

    const upcomingList = document.getElementById("upcoming-list");
    const pastList = document.getElementById("past-list");
    const pastLabel = document.getElementById("past-label");

    if (upcoming.length) {
      upcoming.forEach(s => upcomingList.appendChild(renderStop(s, false)));
    } else {
      const empty = document.createElement("li");
      empty.className = "empty";
      empty.textContent = "No stops scheduled yet — check back soon.";
      upcomingList.appendChild(empty);
    }

    if (past.length) {
      pastLabel.style.display = "block";
      past.forEach(s => pastList.appendChild(renderStop(s, true)));
    }
  })();
</script>
</body>
</html>
